<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <title>页面跳转中 - 双色球预测</title>
    <script>
      // GitHub Pages SPA redirect hack
      // Converts the path to a query string so index.html can restore it
      var pathSegmentsToKeep = 0; // custom domain, no repo prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <!-- 为不执行 JS 的爬虫提供导航回退 -->
    <noscript>
      <h1>页面未找到</h1>
      <p>请访问以下页面：</p>
      <ul>
        <li><a href="https://ssq.roiwk.cn/">双色球预测首页</a></li>
        <li><a href="https://ssq.roiwk.cn/history">历史开奖查询</a></li>
        <li><a href="https://ssq.roiwk.cn/lucky">随机摇号</a></li>
      </ul>
    </noscript>
  </body>
</html>
