<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#cc2233"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d8bff"/>
      <stop offset="100%" stop-color="#2f5fe7"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- 红球 (左上) -->
  <circle cx="22" cy="22" r="16" fill="url(#rg)" filter="url(#s)"/>
  <ellipse cx="17" cy="16" rx="5" ry="3.5" fill="white" opacity="0.35" transform="rotate(-30 17 16)"/>
  <text x="22" y="27" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" opacity="0.9">6</text>
  <!-- 红球 (右上小) -->
  <circle cx="46" cy="14" r="10" fill="url(#rg)" filter="url(#s)" opacity="0.7"/>
  <ellipse cx="43" cy="10" rx="3" ry="2" fill="white" opacity="0.3" transform="rotate(-30 43 10)"/>
  <!-- 蓝球 (右下) -->
  <circle cx="42" cy="42" r="16" fill="url(#bg)" filter="url(#s)"/>
  <ellipse cx="37" cy="36" rx="5" ry="3.5" fill="white" opacity="0.35" transform="rotate(-30 37 36)"/>
  <text x="42" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" opacity="0.9">1</text>
</svg>